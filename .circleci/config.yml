version: 2.1
orbs:
  win: circleci/windows@5.0 # VS2022

jobs:
  ubuntu-build:
    parameters:
      compiler:
        type: enum
        enum: ["clang", "gcc"]
        description: "Compiler to use"
      cc_version:
        type: string
        default: "gcc-13"
        description: "Compiler version (gcc-13 or clang-18)"
      cpp_version:
        type: enum
        enum: ["20", "23", "26"]
        default: "20"
        description: "C++ standard version (20, 23, or 26)"
      sanitizer:
        type: enum
        enum: ["asan", "clang-tidy", "tsan"]
        default: "asan"
        description: "Sanitizer/analysis tool to use"
      coverage:
        type: boolean
        default: false
        description: "Whether to generate code coverage report (only supported for gcc with ASAN)"
    description: "Ubuntu << parameters.cc_version >> C++<< parameters.cpp_version >> build with << parameters.sanitizer >> sanitizer"
    #resource_class: large # 4 CPU-s, 8GB RAM (more needed when using NINJA)
    resource_class: medium+ # medium+: 3 CPU-s, 6GB RAM, large: 4 CPU-s, 8GB RAM
    docker:
      - image: cimg/python:3.14
    environment:
      COMPILER: << parameters.compiler >>
      SANITIZE: << parameters.sanitizer >>
      CPP_STANDARD: CXX<< parameters.cpp_version >>
      COV_PARAM: << parameters.coverage >>
      NO_NINJA: 1 # disable ninja to reduce memory usage in CI, the machines keep OOM-ing due to large number of threads (detects 36 cores instead of 3)
    steps:
      - checkout
      - run: sudo apt-get update
      - run: sudo apt -y --allow-unauthenticated install libdw-dev libunwind-dev gdb gcovr ninja-build
      - run: pipenv install mama
      - run: pipenv run mama install-<< parameters.cc_version >>
      - run: make configure-cmake
      - run:
          name: Build << parameters.cc_version >> C++<< parameters.cpp_version >> << parameters.sanitizer >>
          command: |
            export $CPP_STANDARD=1
            COV_FLAGS=$([[ $COV_PARAM == "true" && $COMPILER == "gcc" && $SANITIZE == "asan" ]] && echo "coverage=src" || echo "")
            # disable clang + clang-tidy sanitizer combination
            SAN_FLAGS=$([[ $SANITIZE == "clang-tidy" && $COMPILER == "clang" ]] && echo "" || echo "$SANITIZE")
            pipenv run mama $COMPILER verbose $SAN_FLAGS $COV_FLAGS build with_tests jobs=3
      - run:
          name: Test << parameters.cc_version >> C++<< parameters.cpp_version >> << parameters.sanitizer >>
          command: |
            export $CPP_STANDARD=1
            COV_FLAGS=$([[ $COV_PARAM == "true" && $COMPILER == "gcc" && $SANITIZE == "asan" ]] && echo "coverage-report=src" || echo "")
            pipenv run mama $COMPILER verbose $COV_FLAGS test="nogdb -vv" jobs=3
      - when:
          condition:
            and:
              - equal: [ "clang-tidy", << parameters.sanitizer >> ]
              - equal: [ "clang", << parameters.compiler >> ]
          steps:
            - run:
                name: Clang Tidy Analysis # run clang-tidy separately for Clang++ because it's super slow during build
                command: |
                  # only keep the first entry for each source file, since we're skipping tests which recompile with RPP_DEBUG=1
                  ./.circleci/dedup_compile_commands.py packages/ReCpp/linux/compile_commands.json
                  run-clang-tidy -j 3 -p packages/ReCpp/linux/ src/rpp/
  win64-cpp20-msvc2022:
    description: Windows MSVC C++20 VS2022 x64 Build
    executor:
      name: win/default
      size: medium # can be medium(4 CPU), large, xlarge, 2xlarge
    steps:
      - checkout
      - run: pip3 install mama
      - run: choco install cmake -y
      - run:
          name: Build
          command: |
              $env:Path+=";$Env:ProgramFiles\CMake\bin";
              $env:BUILD_WITH_MEM_SAFETY="ON";
              $env:CXX20="1";
              mama windows verbose build with_tests jobs=4
      - run:
          name: Tests
          command: |
              $env:Path+=";$Env:ProgramFiles\CMake\bin";
              mama windows verbose test="-vv" jobs=4
  mipsel-cpp20-gcc12:
    description: MIPSEL C++20 GCC Build (NO TESTS)
    resource_class: medium+ # medium+: 3 CPU-s, 6GB RAM, large: 4 CPU-s, 8GB RAM
    docker:
      - image: cimg/python:3.14
    environment:
      NO_NINJA: 1 # disable ninja to reduce memory usage in CI, the machines keep OOM-ing due to large number of threads (detects 36 cores instead of 3)
    steps:
      - checkout
      - run: sudo apt-get update
      - run: sudo apt -y --allow-unauthenticated install gcc-mipsel-linux-gnu g++-mipsel-linux-gnu
      - run: pipenv install mama
      - run: make configure-cmake
      - run: CXX20=1 pipenv run mama mips verbose build jobs=3
  android-build:
    parameters:
      docker_image:
        type: enum
        enum: ["cimg/android:2023.08.1-ndk", "cimg/android:2024.11.1-ndk", "cimg/android:2025.12.1-ndk", "cimg/android:2026.03.1-ndk"]
        description: "Android NDK docker image"
      toolchain:
        type: string
        description: "Informational toolchain description, e.g. ndk-r25b-clang++14"
      ndk_version:
        type: string
        default: ""
        description: "Override NDK version, e.g. 29.0.14206865 to use NDK r29 instead of the default LTS"
    description: "Android << parameters.toolchain >> C++20 build with clang-tidy sanitizer"
    resource_class: medium+ # medium+: 3 CPU-s, 6GB RAM, large: 4 CPU-s, 8GB RAM
    docker:
      - image: << parameters.docker_image >>
    environment:
      NO_NINJA: 1 # disable ninja to reduce memory usage in CI, the machines keep OOM-ing due to large number of threads (detects 36 cores instead of 3)
    steps:
      - checkout
      - when:
          condition: << parameters.ndk_version >>
          steps:
            - run:
                name: Override NDK to << parameters.ndk_version >>
                command: |
                  NDK_PATH="/home/circleci/android-sdk/ndk/<< parameters.ndk_version >>"
                  echo "export ANDROID_NDK_HOME=$NDK_PATH" >> "$BASH_ENV"
                  echo "export ANDROID_NDK_ROOT=$NDK_PATH" >> "$BASH_ENV"
      - run: sudo apt-get update -q && sudo apt-get install -y clang-tidy # install run-clang-tidy wrapper
      - run: make configure-cmake
      - run: sudo rm /usr/lib/python3.12/EXTERNALLY-MANAGED || true
      - run: make configure-pip3
      - run: pip3 install mama
      - run:
          name: Build Android NDK << parameters.toolchain >>
          command: |
              echo "ANDROID_NDK_HOME=$ANDROID_NDK_HOME"
              CXX20=1 mama android verbose build with_tests jobs=3
      - run:
          name: Clang Tidy Analysis # run clang-tidy separately because it's super slow during build
          command: |
            echo "ANDROID_NDK_HOME=$ANDROID_NDK_HOME"
            NDK_CLANG_TIDY="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/clang-tidy"
            echo "Using clang-tidy: $NDK_CLANG_TIDY"
            # only keep the first entry for each source file, since we're skipping tests which recompile with RPP_DEBUG=1
            ./.circleci/dedup_compile_commands.py packages/ReCpp/android/compile_commands.json
            ls /home/circleci/android-sdk/ndk/
            ls -la "$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/"
            run-clang-tidy -clang-tidy-binary "$NDK_CLANG_TIDY" -j 3 -p packages/ReCpp/android/ src/rpp/

workflows:
  build_all:
    jobs:
      # Clang builds on Ubuntu
      - ubuntu-build:
          matrix:
            parameters:
              cpp_version: ["20", "23"]
              sanitizer: ["asan", "clang-tidy", "tsan"]
          name: ubuntu-cpp<< matrix.cpp_version >>-<< matrix.sanitizer >>-clang18
          compiler: clang
          cc_version: clang-18
          coverage: true
      # TODO: clang++20 C++26 tests crash due to codecvt deprecation
      # TODO: Clang C++26 build
      # GCC builds on Ubuntu
      - ubuntu-build:
          matrix:
            parameters:
              cpp_version: ["20", "23"]
              sanitizer: ["asan", "clang-tidy", "tsan"]
          name: ubuntu-cpp<< matrix.cpp_version >>-<< matrix.sanitizer >>-gcc13
          compiler: gcc
          cc_version: gcc-13
          coverage: true
      # Run Newer GCC builds on Ubuntu with C++26 and latest sanitizers
      # TODO: CI does not support gcc-15 yet
      - ubuntu-build:
          matrix:
            parameters:
              cpp_version: ["26"]
              sanitizer: [ "asan", "clang-tidy", "tsan"]
          name: ubuntu-cpp<< matrix.cpp_version >>-<< matrix.sanitizer >>-gcc14
          compiler: gcc
          cc_version: gcc-14
          coverage: false # this can cause OOM in CI with GCC-14, disabling for now
      # Other platform builds
      - win64-cpp20-msvc2022
      - mipsel-cpp20-gcc12
      # Android NDK builds
      - android-build:
          name: android-cpp20-r25b-clang-tidy-clang14
          docker_image: "cimg/android:2023.08.1-ndk"
          toolchain: "ndk-r25b-clang++14"
      - android-build:
          name: android-cpp20-r27-clang-tidy-clang18
          docker_image: "cimg/android:2024.11.1-ndk"
          toolchain: "ndk-r27-clang++18"
          ndk_version: "27.2.12479018"
      - android-build:
          name: android-cpp20-r28b-clang-tidy-clang19
          docker_image: "cimg/android:2025.12.1-ndk"
          toolchain: "ndk-r28b-clang++19"
          ndk_version: "28.0.10865935"
      - android-build:
          name: android-cpp20-r29-clang-tidy-clang20
          docker_image: "cimg/android:2026.03.1-ndk"
          toolchain: "ndk-r29-clang++20"
          ndk_version: "29.0.14206865"

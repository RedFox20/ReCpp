version: 2.1
orbs:
  win: circleci/windows@5.0 # VS2022

jobs:
  ubuntu-build:
    parameters:
      compiler:
        type: enum
        enum: ["clang", "gcc"]
        description: "Compiler to use"
      cc_version:
        type: string
        default: "gcc-13"
        description: "Compiler version (gcc-13 or clang-18)"
      cpp_version:
        type: enum
        enum: ["20", "23", "26"]
        default: "20"
        description: "C++ standard version (20, 23, or 26)"
      sanitizer:
        type: enum
        enum: ["asan", "clang-tidy", "tsan"]
        default: "asan"
        description: "Sanitizer/analysis tool to use"
    description: "Ubuntu << parameters.compiler >> << parameters.cpp_version >> build with << parameters.sanitizer >> sanitizer"
    resource_class: medium+
    docker:
      - image: cimg/python:3.14
    environment:
      COMPILER_NAME: << parameters.compiler >>
      SANITIZER_FLAG: << parameters.sanitizer >>
      CPP_STANDARD: CXX<< parameters.cpp_version >>
    steps:
      - checkout
      - run: sudo apt-get update
      - run: sudo apt -y --allow-unauthenticated install libdw-dev libunwind-dev gdb gcovr ninja-build
      - run: pipenv install mama
      - run: pipenv run mama install-<< parameters.cc_version >>
      - run: make configure-cmake
      - run:
          name: Build << parameters.compiler >> << parameters.cpp_version >> << parameters.sanitizer >>
          command: |
            export $CPP_STANDARD=1
            COVERAGE=$([[ $COMPILER_NAME == "gcc" && $SANITIZER_FLAG == "asan" ]] && echo "coverage=src" || echo "")
            pipenv run mama $COMPILER_NAME verbose $SANITIZER_FLAG $COVERAGE build with_tests
      - run:
          name: Test << parameters.compiler >> << parameters.cpp_version >> << parameters.sanitizer >>
          command: |
            export $CPP_STANDARD=1
            COVERAGE=$([[ $COMPILER_NAME == "gcc" && $SANITIZER_FLAG == "asan" ]] && echo "coverage-report=src" || echo "")
            pipenv run mama $COMPILER_NAME verbose $COVERAGE test="nogdb -vv"
  msvc-win64-cpp20:
    description: Windows MSVC C++20 VS2022 x64 Build
    executor:
      name: win/default
      size: medium # can be medium, large, xlarge, 2xlarge
    steps:
      - checkout
      - run: pip3 install mama
      - run: choco install cmake -y
      - run:
          name: Build
          command: |
              $env:Path+=";$Env:ProgramFiles\CMake\bin";
              $env:BUILD_WITH_MEM_SAFETY="ON";
              $env:CXX20="1";
              mama windows verbose build with_tests
      - run:
          name: Tests
          command: |
              $env:Path+=";$Env:ProgramFiles\CMake\bin";
              mama windows verbose test="-vv"
  gcc-mipsel-cpp20:
    description: MIPSEL C++20 GCC Build (NO TESTS)
    resource_class: medium+ # medium+: 3 CPU-s, 6GB RAM, large: 4 CPU-s, 8GB RAM
    docker:
      - image: cimg/python:3.14
    steps:
      - checkout
      - run: sudo apt-get update
      - run: sudo apt -y --allow-unauthenticated install gcc-mipsel-linux-gnu g++-mipsel-linux-gnu
      - run: pipenv install mama
      - run: make configure-cmake
      - run: CXX20=1 pipenv run mama mips verbose build
  android-build:
    parameters:
      docker_image:
        type: enum
        enum: ["cimg/android:2023.08.1-ndk", "cimg/android:2024.11.1-ndk", "cimg/android:2025.12.1-ndk", "cimg/android:2026.03.1-ndk"]
        description: "Android NDK docker image"
      toolchain:
        type: string
        description: "Informational toolchain description, e.g. ndk-r25b-clang++14"
      ndk_version:
        type: string
        default: ""
        description: "Override NDK version, e.g. 29.0.14206865 to use NDK r29 instead of the default LTS"
    description: "Android C++20 Build << parameters.toolchain >>"
    resource_class: medium+ # medium+: 3 CPU-s, 6GB RAM, large: 4 CPU-s, 8GB RAM
    docker:
      - image: << parameters.docker_image >>
    steps:
      - checkout
      - when:
          condition: << parameters.ndk_version >>
          steps:
            - run:
                name: Override NDK to << parameters.ndk_version >>
                command: |
                  NDK_PATH="/home/circleci/android-sdk/ndk/<< parameters.ndk_version >>"
                  echo "export ANDROID_NDK_HOME=$NDK_PATH" >> "$BASH_ENV"
                  echo "export ANDROID_NDK_ROOT=$NDK_PATH" >> "$BASH_ENV"
      - run: make configure-cmake
      - run: sudo rm /usr/lib/python3.12/EXTERNALLY-MANAGED || true
      - run: make configure-pip3
      - run: pip3 install mama
      - run: 
          name: Build Android NDK << parameters.toolchain >>
          command: |
              echo "ANDROID_NDK_HOME=$ANDROID_NDK_HOME"
              CXX20=1 mama android verbose build with_tests

workflows:
  build_all:
    jobs:
      # Clang builds on Ubuntu
      - ubuntu-build:
          matrix:
            parameters:
              cpp_version: ["20", "23"]
              sanitizer: ["asan", "clang-tidy", "tsan"]
          name: clang-ubuntu-cpp<< matrix.cpp_version >>-<< matrix.sanitizer >>
          compiler: clang
          cc_version: clang-18
      # GCC builds on Ubuntu
      - ubuntu-build:
          matrix:
            parameters:
              cpp_version: ["20", "23"]
              sanitizer: ["asan", "clang-tidy", "tsan"]
          name: gcc-ubuntu-cpp<< matrix.cpp_version >>-<< matrix.sanitizer >>
          compiler: gcc
          cc_version: gcc-13
      # Other platform builds
      - msvc-win64-cpp20
      - gcc-mipsel-cpp20
      # Android NDK builds
      - android-build:
          name: android-ndk-r25b-clang++14
          docker_image: "cimg/android:2023.08.1-ndk"
          toolchain: "ndk-r25b-clang++14"
      - android-build:
          name: android-ndk-r28-clang++19
          docker_image: "cimg/android:2024.11.1-ndk"
          toolchain: "ndk-r28-clang++19"
      - android-build:
          name: android-ndk-r28b-clang++19
          docker_image: "cimg/android:2025.12.1-ndk"
          toolchain: "ndk-r28b-clang++19"
      - android-build:
          name: android-ndk-r29-clang++20
          docker_image: "cimg/android:2026.03.1-ndk"
          toolchain: "ndk-r29-clang++20"
          ndk_version: "29.0.14206865"

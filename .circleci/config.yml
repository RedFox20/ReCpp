version: 2.1
orbs:
  win: circleci/windows@5.0 # VS2022

jobs:
  ubuntu-cpp-build:
    parameters:
      compiler:
        type: enum
        enum: ["clang", "gcc"]
        description: "Compiler to use"
      cc_version:
        type: string
        default: "gcc-13"
        description: "Compiler version (gcc-13 or clang-18)"
      cpp_version:
        type: enum
        enum: ["CXX20", "CXX23"]
        default: "CXX20"
        description: "C++ standard version"
      sanitizer:
        type: enum
        enum: ["asan", "clang-tidy", "tsan"]
        default: "asan"
        description: "Sanitizer/analysis tool to use"
      coverage_report:
        type: boolean
        default: false
        description: "Enable coverage reporting"
    description: "Ubuntu << parameters.compiler >> << parameters.cpp_version >> build with << parameters.sanitizer >> sanitizer"
    resource_class: medium+
    docker:
      - image: cimg/python:3.14
    environment:
      COMPILER_NAME: << parameters.compiler >>
      SANITIZER_FLAG: << parameters.sanitizer >>
      CPP_STANDARD: << parameters.cpp_version >>
    steps:
      - checkout
      - run: sudo apt-get update
      - run: sudo apt -y --allow-unauthenticated install libdw-dev libunwind-dev gdb gcovr
      - run: pipenv install mama
      - run: pipenv run mama install-<< parameters.cc_version >>
      - run: make configure-cmake
      - run:
          name: Build
          command: |
            export ${CPP_STANDARD}=1
            COVERAGE=$(<< parameters.coverage_report >> && echo "coverage=src" || echo "")
            pipenv run mama $COMPILER_NAME verbose $SANITIZER_FLAG $COVERAGE build with_tests
      - run:
          name: Tests
          command: |
            export ${CPP_STANDARD}=1
            COVERAGE=$(<< parameters.coverage_report >> && echo "coverage-report=src" || echo "")
            pipenv run mama $COMPILER_NAME verbose $COVERAGE test="nogdb -vv"
  msvc-win64-cpp20:
    description: Windows MSVC C++20 VS2022 x64 Build
    executor:
      name: win/default
      size: medium # can be medium, large, xlarge, 2xlarge
    steps:
      - checkout
      - run: pip3 install mama
      - run: choco install cmake -y
      - run:
          name: Build
          command: |
              $env:Path+=";$Env:ProgramFiles\CMake\bin";
              $env:BUILD_WITH_MEM_SAFETY="ON";
              $env:CXX20="1";
              mama windows verbose build with_tests
      - run:
          name: Tests
          command: |
              $env:Path+=";$Env:ProgramFiles\CMake\bin";
              mama windows verbose test="-vv"
  gcc-mipsel-cpp20:
    description: MIPSEL C++20 GCC Build (NO TESTS)
    resource_class: medium+ # medium+: 3 CPU-s, 6GB RAM, large: 4 CPU-s, 8GB RAM
    docker:
      - image: cimg/python:3.14
    steps:
      - checkout
      - run: sudo apt-get update
      - run: sudo apt -y --allow-unauthenticated install gcc-mipsel-linux-gnu g++-mipsel-linux-gnu
      - run: pipenv install mama
      - run: make configure-cmake
      - run: CXX20=1 pipenv run mama mips verbose build
  clang-android-cpp20:
    description: Android C++20 Build (NO TESTS)
    resource_class: medium+ # medium+: 3 CPU-s, 6GB RAM, large: 4 CPU-s, 8GB RAM
    docker:
      - image: cimg/android:2023.08.1-ndk
    steps:
      - checkout
      - run: make configure-cmake
      - run: make configure-pip3
      - run: pip3 install mama
      - run: CXX20=1 mama android verbose build with_tests

workflows:
  build_all:
    jobs:
      # Clang C++20 builds
      - ubuntu-cpp-build:
          name: clang-ubuntu-cpp20
          compiler: clang
          cc_version: clang-18
          cpp_version: CXX20
          sanitizer: asan
          coverage_report: false
      - ubuntu-cpp-build:
          name: clang-ubuntu-tidy-cpp20
          compiler: clang
          cc_version: clang-18
          cpp_version: CXX20
          sanitizer: clang-tidy
          coverage_report: false
      - ubuntu-cpp-build:
          name: clang-ubuntu-tsan-cpp20
          compiler: clang
          cc_version: clang-18
          cpp_version: CXX20
          sanitizer: tsan
          coverage_report: false
      # GCC C++20 builds
      - ubuntu-cpp-build:
          name: gcc-ubuntu-cpp20
          compiler: gcc
          cc_version: gcc-13
          cpp_version: CXX20
          sanitizer: asan
          coverage_report: true
      - ubuntu-cpp-build:
          name: gcc-ubuntu-tidy-cpp20
          compiler: gcc
          cc_version: gcc-13
          cpp_version: CXX20
          sanitizer: clang-tidy
          coverage_report: false
      - ubuntu-cpp-build:
          name: gcc-ubuntu-tsan-cpp20
          compiler: gcc
          cc_version: gcc-13
          cpp_version: CXX20
          sanitizer: tsan
          coverage_report: false
      # Other platform builds
      - msvc-win64-cpp20
      - gcc-mipsel-cpp20
      - clang-android-cpp20
